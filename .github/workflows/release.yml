name: Prepare PlayStatus Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing annotated vX.Y.Z tag to retry
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A manual retry runs the current workflow code from the selected branch;
          # `release_tag` is validated separately by release-build.sh.
          ref: ${{ github.ref }}

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/playstatus-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)$(uuidgen)"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          APPLE_DEVELOPER_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          test -n "$APPLE_DEVELOPER_IDENTITY"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_DEVELOPER_IDENTITY=$APPLE_DEVELOPER_IDENTITY" >> "$GITHUB_ENV"

      - name: Configure notarization credentials
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APPSTORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials playstatus-notary \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build, notarize, and verify release
        id: package
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          NOTARY_PROFILE: playstatus-notary
          DERIVED_DATA_PATH: ${{ runner.temp }}/PlayStatusDerivedData
          ARCHIVE_PATH: ${{ runner.temp }}/PlayStatus.xcarchive
          DIST_DIR: ${{ runner.temp }}/PlayStatus-dist
        run: scripts/release-build.sh

      - name: Create immutable draft GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          RELEASE_ASSET: ${{ steps.package.outputs.asset_path }}
        run: |
          set -euo pipefail
          ASSET_NAME="$(basename "$RELEASE_ASSET")"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET_NAME" >/dev/null
            echo "Retaining existing immutable GitHub Release asset: $ASSET_NAME"
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
              --verify-tag \
              --title "PlayStatus ${RELEASE_TAG#v}" \
              --draft
          fi

          PUBLISHED_ASSET_DIR="$RUNNER_TEMP/published-release-asset"
          mkdir -p "$PUBLISHED_ASSET_DIR"
          gh release download "$RELEASE_TAG" --pattern "$ASSET_NAME" --dir "$PUBLISHED_ASSET_DIR"
          PUBLISHED_ASSET="$PUBLISHED_ASSET_DIR/$ASSET_NAME"
          test -f "$PUBLISHED_ASSET"
          echo "asset_path=$PUBLISHED_ASSET" >> "$GITHUB_OUTPUT"
          echo "Draft release ready: $(gh release view "$RELEASE_TAG" --json url --jq .url)" >> "$GITHUB_STEP_SUMMARY"

      - name: Remove temporary signing keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
