name: Validate cask

on:
  pull_request:
    paths:
      - "Casks/playstatus.rb"
      - ".github/workflows/cask.yml"
  push:
    branches: [main]
    paths:
      - "Casks/playstatus.rb"

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Tap this checkout
        run: brew tap --custom-remote nbolar/playstatus "$GITHUB_WORKSPACE"
      - name: Audit cask
        run: brew audit --cask --strict nbolar/playstatus/playstatus
      - name: Install and uninstall cask
        run: |
          brew install --cask nbolar/playstatus/playstatus
          test -d "/Applications/PlayStatus.app"
          brew uninstall --cask --force playstatus
          test ! -d "/Applications/PlayStatus.app"
